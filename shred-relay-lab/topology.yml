name: shred-relay
topology:
  kinds:
    ceos:
      image: ceos:4.34.0F
  nodes:
    was-sw01:
      kind: ceos
      startup-config: was-sw01-startup.cfg
    turbine-src:
      kind: linux
      image: alpine:latest
    biscayne:
      kind: linux
      image: alpine:latest
  links:
    - endpoints: ["was-sw01:et1", "turbine-src:eth1"]
    - endpoints: ["was-sw01:et2", "biscayne:eth1"]

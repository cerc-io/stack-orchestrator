# Telegraf configuration for Agave monitoring

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = "telegraf"
  omit_hostname = false

# Output to InfluxDB
[[outputs.influxdb]]
  urls = ["http://localhost:8086"]
  database = "agave_metrics"
  skip_database_creation = true
  username = "admin"
  password = "admin"
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"

# Custom getSlot latency check
[[inputs.exec]]
  commands = ["/scripts/check_getslot_latency.sh"]
  timeout = "30s"
  data_format = "influx"

# Canonical mainnet slot tracking
[[inputs.exec]]
  commands = ["/scripts/check_canonical_slot.sh"]
  timeout = "30s"
  data_format = "influx"
